<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Hanken+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Hanken Grotesk", sans-serif;
      letter-spacing: -0.05em;
      color: #ffffff;
      height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: -1;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2vh 2vw;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: transparent;
      z-index: 30;
      color: white;
    }

    nav a {
      text-decoration: none;
    }

    .button-design {
      padding: 8px 16px;
      background: none;
      border: none;
      color: #ffffff;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .button-design:hover {
      text-shadow: 0 0 8px #fff, 0 0 12px #fff, 0 0 16px #00f0ff;
      color: #ffffff;
      background: none;
      border: none;
    }

    .back-button {
      margin-top: 1.8rem;
      padding: 8px 18px;
      border-radius: 10px;
      background: none;
      border: 1px solid #66fcf1;
      color: #66fcf1;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
      font-family: "Bricolage Grotesque", sans-serif;
    }

    .back-button:hover {
      background-color: #66fcf1;
      color: #0b0c10;
    }
    </style>
</head>
<body>
    <h1>Profile</h1>
    {% if user %}
        <p>Username: {{ user.username }}</p>
        <p>Email: {{ user.email }}</p>
        <p>Created: {{ user.date_joined }}</p>
        <p>Last Login: {{ user.last_login|default:"Never" }}</p>
    {% else %}
        <p>{{ error }}</p>
    {% endif %}
</body>
</html>
