<!DOCTYPE html>
<html>
<head>
    <title>Log In - Vision Play Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    {% load static %}
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            overflow: hidden;
        }

        .form-container {
            text-align: center;
            background-color: #f5f5f5;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .button-design {
            padding: 8px 16px;
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #000000;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            margin-top: 18px;
        }

        .button-design:hover {
            background-color: #f0f0f0;
        }

        form {
            margin-top: 20px;
        }

        input {
            margin: 5px 0;
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 20px;
        }

        .VPH-header {
            font-family: 'Inter', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px; 
            color: #000; 
        }

        .page-aligner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            z-index: 1;
        }

        .gradient-text {
            background: linear-gradient(90deg, #6254FF, #48FF7C, #44C3A8); /* adjust colors as needed */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bg-images img {
            position: absolute;
            margin: 0;
            z-index: 0;
        }

    </style>
</head>
<body>
    <div class="bg-images">
        <img src="{% static 'images/pages/ball-1.webp' %}" alt="ball-1"
             style="min-width: 30vw; max-width: 50vw; top: 0; left: 0; transform: translate(-50%, -50%);" />

        <img src="{% static 'images/pages/ball-2.webp' %}" alt="ball-2"
             style="min-width: 50vw; max-width: 70vw; top: 50%; right: 0; transform: translate(30%, -60%);" />

        <img src="{% static 'images/pages/ball-3.webp' %}" alt="ball-3"
             style="min-width: 10vw; max-width: 20vw; top: 100%; left: 0; transform: translate(-50%, -50%);" />
    </div>
    <div class="page-aligner">
        <div class="VPH-header gradient-text">Vision Play Hub</div>
        <div class="form-container">
            {% if messages %}
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Username" required><br>
                <input type="password" name="password" placeholder="Password" required><br>
                <button class= "button-design" type="submit">Log In</button>
            </form>
            <p>Need an account? <a href="{% url 'signup' %}">Sign Up</a></p>
        </div>
    </div>
</body>
</html>
