<!DOCTYPE html>
<html>
<head>
    <title>Log In - Vision Play Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    {% load static %}
    {% load socialaccount %}
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Hanken Grotesk", sans-serif;
            font-optical-sizing: auto;
            font-weight: 700;
            letter-spacing: -0.05em;
            font-style: normal;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            position: relative;
            color: white;
            background-color: #09080e;
        }

        .form-container {
            text-align: center;
            background-color: transparent;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px 5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            color: black;
            position: relative;
            z-index: 20;
        }

        .button-design {
            padding: 8px 16px;
            background: none;
            border: none;
            color: #ffffff;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
        }

        .button-design:hover {
            text-shadow: 0 0 8px #fff, 0 0 12px #fff, 0 0 16px #00f0ff;
            color: #ffffff;
            background: none;
            border: none;
        }

        .google-button {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            background: #ffffff;
            border: 1px solid #ccc;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: #000000;
            text-decoration: none;
            margin: 10px 0;
            width: 100%;
        }

        .google-button:hover {
            box-shadow: 0 0 8px #fff, 0 0 12px #00f0ff;
        }

        .google-button img {
            width: 20px;
            height: 20px;
            margin-right: 10px;
        }

        .or-text {
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            margin: 10px 0;
            text-align: center;
        }

        form {
            margin-top: 20px;
        }

        input {
            margin: 5px 0;
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 20px;
            font-family: "Bricolage Grotesque", sans-serif;
        }

        input::placeholder {
            font-family: "Bricolage Grotesque", sans-serif;
            color: #999;
            font-size: 0.95rem;
        }

        .VPH-header {
            font-family: 'Inter', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            color: white;
            position: relative;
            z-index: 20;
        }

        .page-aligner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            z-index: 20;
            position: relative;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2vh 2vw;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: transparent;
            z-index: 30;
            color: white;
        }

        nav a {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <!-- Background video -->
    <iframe id="bg-anim" src="{% static 'videos/Jowstick animation.svg' %}" width="100vw" height="100vh" frameBorder="0" style="opacity: 0.5;position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -10;"></iframe>
    <!-- Overlay to darken the video -->
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: -1;"></div>

    <!-- Nav bar -->
    <nav>
        <div style="display: flex; align-items: center; gap: 0.8vw;">
            <a href="/">
                <img src="{% static 'images/pages/logo-colour.svg' %}" alt="Vision Play Hub Logo" style="height: 6vh; width: auto;" />
            </a>
        </div>
        <div style="display: flex; gap: 0.8vw;">
            <a href="{% url 'login' %}">
                <button class="button-design">Log In</button>
            </a>
            <a href="{% url 'signup' %}">
                <button class="button-design">Sign Up</button>
            </a>
            <a href="{% url 'leaderboard' %}">
                <button class="button-design">Leaderboards</button>
            </a>
            <a href="/accounts/profile/">
                <button class="button-design">Profile</button>
            </a>
            <a href="{% url 'logout' %}">
                <button class="button-design">Log Out</button>
            </a>
        </div>
    </nav>

    <!-- Content -->
    <div class="page-aligner">
        <div class="VPH-header">Vision Play Hub</div>

        <div class="form-container">
            {% if messages %}
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            {% endif %}
            <form id="login-form" method="post">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Username" required><br>
                <input type="password" name="password" placeholder="Password" required><br>
                <button class="button-design" type="submit">Log In</button>
            </form>
            <div class="or-text">OR</div>
            <a href="{% provider_login_url 'google' %}" class="google-button">
                <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google Logo">
                Sign in with Google
            </a>
            <p style="color: white; margin-top: 20px;">Need an account?</p>
            <a href="{% url 'signup' %}">
                <button class="button-design" style="font-size: 0.9rem;">Sign Up</button>
            </a>
        </div>
    </div>
    <script>
        function getCookie(name) {
            const cookieValue = document.cookie
                .split('; ')
                .find(row => row.startsWith(name + '='))
                ?.split('=')[1];
            return cookieValue || '';
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Apply theme class based on localStorage
            const isLightMode = localStorage.getItem('themeMode') === 'true';
            const isColorFilter = localStorage.getItem('colorFilter') === 'true';
            const appDiv = document.querySelector('.App');
            if (isLightMode) {
                appDiv.classList.add('light');
            } else if (isColorFilter) {
                appDiv.classList.add('colorblind');
            }

            // Handle login form submission
            const loginForm = document.getElementById('login-form');
            if (loginForm) {
                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const username = e.target.username.value;
                    const password = e.target.password.value;
                    const csrfToken = getCookie('csrftoken');

                    try {
                        const response = await fetch('{% url 'login' %}', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/x-www-form-urlencoded',
                                'X-CSRFToken': csrfToken,
                            },
                            body: new URLSearchParams({
                                'username': username,
                                'password': password,
                            }),
                            credentials: 'include',
                        });

                        // Check if response is a redirect (successful login)
                        if (response.redirected) {
                            console.log('Login successful, redirecting to:', response.url);

                            // Fetch user profile settings after successful login
                            const profileResponse = await fetch('{% url 'user_profile' %}', {
                                headers: {
                                    'Authorization': `Bearer ${getCookie('access_token')}`,
                                    'X-CSRFToken': csrfToken,
                                },
                                credentials: 'include',
                            });

                            if (profileResponse.ok) {
                                const profileData = await profileResponse.json();
                                console.log('Profile data fetched:', profileData);

                                // Store settings in localStorage
                                localStorage.setItem('access_token', getCookie('access_token'));
                                localStorage.setItem('refresh_token', getCookie('refresh_token'));
                                localStorage.setItem('themeMode', profileData.is_dark_mode ? "light" : "dark");
                                localStorage.setItem('colorFilter', profileData.is_colorblind_mode ? "colorblind" : "trichromatic");
                                localStorage.setItem('log', (!localStorage.getItem('log')) ? String("Added in " + localStorage.getItem('themeMode') + " and " + localStorage.getItem('colorFilter')) : localStorage.getItem('log') + String("\nAdded in " + localStorage.getItem('themeMode') + " and " + localStorage.getItem('colorFilter')));

                                // Update theme class
                                appDiv.classList.remove('light', 'colorblind');
                                if (profileData.is_dark_mode) {
                                    appDiv.classList.add('light');
                                } else if (profileData.is_colorblind_mode) {
                                    appDiv.classList.add('colorblind');
                                }
                            } else {
                                console.error('Failed to fetch profile data:', profileResponse.statusText);
                            }

                            // Follow the redirect to homepage
                            window.location.href = response.url;
                        } else {
                            // Handle non-redirect response (likely a failed login)
                            const text = await response.text();
                            console.error('Login failed, response:', text);
                            const messageDiv = document.createElement('div');
                            messageDiv.style.marginBottom = '1rem';
                            messageDiv.style.color = 'red';
                            messageDiv.textContent = 'Invalid username or password.';
                            const formContainer = document.querySelector('div[style*="max-width: 400px"]');
                            formContainer.parentNode.insertBefore(messageDiv, formContainer);
                        }
                    } catch (error) {
                        console.error('Login error:', error);
                        const messageDiv = document.createElement('div');
                        messageDiv.style.marginBottom = '1rem';
                        messageDiv.style.color = 'red';
                        messageDiv.textContent = 'An error occurred during login. Please try again.';
                        const formContainer = document.querySelector('div[style*="max-width: 400px"]');
                        formContainer.parentNode.insertBefore(messageDiv, formContainer);
                    }
                });
            } else {
                console.error('Form with id="login-form" not found in the DOM');
            }
        });
    </script>
</body>
</html>
