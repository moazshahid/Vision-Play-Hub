<!DOCTYPE html>
<html>
<head>
    <title>Log In - Vision Play Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    {% load static %}
    {% load socialaccount %}
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Hanken Grotesk", sans-serif;
            font-optical-sizing: auto;
            font-weight: 700;
            letter-spacing: -0.05em;
            font-style: normal;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            position: relative;
            color: white;
            background-color: #09080e;
        }

        .form-container {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.1); 
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px 5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            color: white; 
            position: relative;
            z-index: 20;
        }

        .message-success {
            background-color: #28a745; 
            color: white;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
        }

        .message-error {
            background-color: #dc3545; 
            color: white;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
        }

        .button-design {
            padding: 8px 16px;
            background: none;
            border: none;
            color: #ffffff;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Hanken Grotesk', sans-serif;
        }

        .button-design:hover {
            text-shadow: 0 0 8px #fff, 0 0 12px #fff, 0 0 16px #00f0ff;
            color: #ffffff;
            background: none;
            border: none;
        }

        .google-button {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            background: #ffffff;
            border: 1px solid #ccc;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 0.9rem;
            color: #000000;
            text-decoration: none;
            margin: 10px 0;
            width: 100%;
        }

        .google-button:hover {
            box-shadow: 0 0 8px #fff, 0 0 12px #00f0ff;
        }

        .google-button img {
            width: 20px;
            height: 20px;
            margin-right: 10px;
        }

        .or-text {
            color: white;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 0.9rem;
            margin: 10px 0;
            text-align: center;
        }

        form {
            margin-top: 20px;
        }

        input {
            margin: 5px 0;
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 20px;
            font-family: "Bricolage Grotesque", sans-serif;
        }

        input::placeholder {
            font-family: "Bricolage Grotesque", sans-serif;
            color: #999;
            font-size: 0.95rem;
        }

        .VPH-header {
            font-family: 'Hanken Grotesk', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            color: white;
            position: relative;
            z-index: 20;
        }

        .page-aligner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            z-index: 20;
            position: relative;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2vh 2vw;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: transparent;
            z-index: 30;
            color: white;
        }

        nav a {
            text-decoration: none;
        }

        @keyframes glowPulse {
            0% {
                text-shadow:
                0 0 7px rgba(255, 255, 255, 0.6),
                0 0 15px rgba(0, 240, 255, 0.5),
                0 0 20px rgba(0, 240, 255, 0.4),
                0 0 30px rgba(0, 240, 255, 0.3);
            }
            33% {
                text-shadow:
                0 0 7px rgba(255, 255, 255, 0.6),
                0 0 15px rgba(204, 0, 255, 0.5),
                0 0 20px rgba(204, 0, 255, 0.4),
                0 0 30px rgba(204, 0, 255, 0.3);
            }
            66% {
                text-shadow:
                0 0 7px rgba(255, 255, 255, 0.6),
                0 0 15px rgba(255, 0, 128, 0.5),
                0 0 20px rgba(255, 0, 128, 0.4),
                0 0 30px rgba(255, 0, 128, 0.3);
            }
            100% {
                text-shadow:
                0 0 7px rgba(255, 255, 255, 0.6),
                0 0 15px rgba(0, 240, 255, 0.5),
                0 0 20px rgba(0, 240, 255, 0.4),
                0 0 30px rgba(0, 240, 255, 0.3);
            }
        }

        .glow-pulse {
            animation: glowPulse 5s ease-in-out infinite;
            color: #ffffff;
        }

    </style>
</head>
<body>
    <!-- Background video -->
    <iframe id="bg-anim" src="{% static 'videos/Jowstick animation.svg' %}" style="opacity: 0.5;position: fixed; top: -7%; left: -10%; width: 120%; height: 120%; z-index: -10;"></iframe>
    <!-- Overlay to darken the video -->
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: -1;"></div>

    <!-- Nav bar -->
    <nav>
        <div style="display: flex; align-items: center; gap: 0.8vw;">
            <a href="/">
                <img src="{% static 'images/pages/logo-colour.svg' %}" alt="Vision Play Hub Logo" style="height: 6vh; width: auto;" />
            </a>
            <a href="{% url 'aboutus' %}">
                <button class="button-design">About Us</button>
            </a>
            <a href="{% url 'faqs' %}">
                <button class="button-design">FAQs</button>
            </a>
        </div>
        <div style="display: flex; gap: 0.8vw;">
            <a href="{% url 'login' %}">
                <button class="button-design">Log In</button>
            </a>
            <a href="{% url 'signup' %}">
                <button class="button-design">Sign Up</button>
            </a>
        </div>
    </nav>

    <!-- Content -->
    <div class="page-aligner">
        <div class="VPH-header glow-pulse">Vision Play Hub</div>

        <div class="form-container">
            {% if messages %}
                {% for message in messages %}
                    <p class="{% if message.tags == 'success' %}message-success{% else %}message-error{% endif %}">{{ message }}</p>
                {% endfor %}
            {% endif %}
            <form id="login-form" method="post">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Username" required><br>
                <input type="password" name="password" placeholder="Password" required><br>
                <button class="button-design" type="submit">Log In</button>
            </form>
            <div class="or-text">OR</div>
            <a href="{% provider_login_url 'google' %}" class="google-button">
                <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google Logo">
                Sign in with Google
            </a>
            <p style="color: white; margin-top: 20px;">Need an account?</p>
            <a href="{% url 'signup' %}">
                <button class="button-design" style="font-size: 0.9rem;">Sign Up</button>
            </a>
        </div>
    </div>
    <script>
        async function getCsrfToken() {
            try {
                const response = await fetch('http://localhost:8000/csrf/', {
                    method: 'GET',
                    credentials: 'include',
                });
                if (!response.ok) throw new Error('Failed to fetch CSRF token');
                const data = await response.json();
                console.log('CSRF token fetched:', data.message);
                const csrfToken = document.cookie.match(/csrftoken=([^;]+)/)?.[1];
                if (csrfToken) localStorage.setItem('csrftoken', csrfToken);
                return csrfToken;
            } catch (error) {
                console.error('CSRF fetch error:', error.message);
                return null;
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = e.target.username.value;
            const password = e.target.password.value;
            let csrfToken = localStorage.getItem('csrftoken') || document.cookie.match(/csrftoken=([^;]+)/)?.[1];
            console.log('Initial CSRF token:', csrfToken || 'null');

            if (!csrfToken) {
                csrfToken = await getCsrfToken();
                if (!csrfToken) {
                    alert('Login failed: Unable to fetch CSRF token');
                    return;
                }
            }

            try {
                // Step 1: Get JWT tokens
                const tokenResponse = await fetch('http://localhost:8000/api/token/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken,
                    },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include',
                });
                const tokenText = await tokenResponse.text();
                console.log('Token response:', tokenText);
                let tokenData;
                try {
                    tokenData = JSON.parse(tokenText);
                } catch (parseError) {
                    throw new Error(`Invalid JSON from /api/token/: ${tokenText}`);
                }
                if (!tokenResponse.ok) {
                    throw new Error(tokenData.detail || 'Failed to get tokens');
                }
                const { access, refresh } = tokenData;

                // Store tokens
                localStorage.setItem('access_token', access);
                localStorage.setItem('refresh_token', refresh);
                localStorage.setItem('csrftoken', csrfToken);
                document.cookie = `access_token=${access};max-age=3600;path=/;samesite=Lax`;
                document.cookie = `refresh_token=${refresh};max-age=86400;path=/;samesite=Lax`;
                document.cookie = `csrftoken=${csrfToken};max-age=31449600;path=/;samesite=Lax`;
                console.log('Tokens stored: access_token=', access.substring(0, 10) + '...', 'refresh_token=', refresh.substring(0, 10) + '...', 'csrftoken=', csrfToken);

                // Step 2: Get user profile settings
                const profileResponse = await fetch('http://localhost:8000/api/user-profile/', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${access}`,
                        'X-CSRFToken': csrfToken,
                    },
                    credentials: 'include',
                });
                const profileText = await profileResponse.text();
                console.log('Profile response:', profileText);
                let profileData;
                try {
                    profileData = JSON.parse(profileText);
                } catch (parseError) {
                    throw new Error(`Invalid JSON from /api/user-profile/: ${profileText}`);
                }
                if (!profileResponse.ok) {
                    throw new Error(profileData.error || 'Failed to get profile settings');
                }
                localStorage.setItem('themeMode', profileData.is_dark_mode ? 'dark' : 'light');
                localStorage.setItem('colorFilter', profileData.is_colorblind_mode ? 'colorblind' : 'normal');
                console.log('Settings stored: themeMode=', localStorage.getItem('themeMode'), 'colorFilter=', localStorage.getItem('colorFilter'));

                // Step 3: Server-side login
                const formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);
                formData.append('csrfmiddlewaretoken', csrfToken);
                const loginResponse = await fetch('{% url "login" %}', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-CSRFToken': csrfToken,
                    },
                    credentials: 'include',
                    redirect: 'manual',
                });
                console.log('Login response status:', loginResponse.status, 'Redirected:', loginResponse.redirected);
                if (loginResponse.status === 0 || loginResponse.redirected) {
                    console.log('Server-side login successful, redirecting to home');
                    window.location.href = '{% url "home" %}';
                } else {
                    const loginText = await loginResponse.text();
                    console.log('Login response:', loginText);
                    throw new Error('Server-side login failed: ' + loginText);
                }
            } catch (error) {
                console.error('Login error:', error.message);
                alert('Login failed: ' + error.message);
            }
        });
    </script>
</body>
</html>
