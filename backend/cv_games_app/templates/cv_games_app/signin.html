<!DOCTYPE html>
<html>
<head>
    <title>Log In - CV Games</title>
</head>
<body>
    <h2>Log In</h2>
    {% if messages %}
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <label>Username:</label>
        <input type="text" name="username" required><br>
        <label>Password:</label>
        <input type="password" name="password" required><br>
        <button type="submit">Log In</button>
    </form>
    <p>Need an account? <a href="{% url 'signup' %}">Sign Up</a></p>
</body>
</html>
