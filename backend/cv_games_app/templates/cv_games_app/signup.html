<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Vision Play Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    {% load static %}
    {% load socialaccount %}
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Hanken Grotesk", sans-serif;
            font-optical-sizing: auto;
            font-weight: 700;
            letter-spacing: -0.05em;
            font-style: normal;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            position: relative;
            color: white;
            background-color: #09080e;
        }

        .form-container {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.1); 
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px 5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            color: white; 
            position: relative;
            z-index: 20;
        }

        .message-success {
            background-color: #28a745; 
            color: white;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
        }

        .message-error {
            background-color: #dc3545; 
            color: white;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
        }

        .button-design {
            padding: 8px 16px;
            background: none;
            border: none;
            color: #ffffff;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Hanken Grotesk', sans-serif;
        }

        .button-design:hover {
            text-shadow: 0 0 8px #fff, 0 0 12px #fff, 0 0 16px #00f0ff;
            color: #ffffff;
            background: none;
            border: none;
        }

        .google-button {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            background: #ffffff;
            border: 1px solid #ccc;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 0.9rem;
            color: #000000;
            text-decoration: none;
            margin: 10px 0;
            width: 100%;
        }

        .google-button:hover {
            box-shadow: 0 0 8px #fff, 0 0 12px #00f0ff;
        }

        .google-button img {
            width: 20px;
            height: 20px;
            margin-right: 10px;
        }

        .or-text {
            color: white;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 0.9rem;
            margin: 10px 0;
            text-align: center;
        }

        form {
            margin-top: 20px;
        }

        input {
            margin: 5px 0;
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 20px;
            font-family: "Bricolage Grotesque", sans-serif;
        }

        input::placeholder {
            font-family: "Bricolage Grotesque", sans-serif;
            color: #999;
            font-size: 0.95rem;
        }

        .VPH-header {
            font-family: 'Hanken Grotesk', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            color: white;
            position: relative;
            z-index: 20;
        }

        .page-aligner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            z-index: 20;
            position: relative;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2vh 2vw;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: transparent;
            z-index: 30;
            color: white;
        }

        nav a {
            text-decoration: none;
        }

        @keyframes glowPulse {
            0% {
                text-shadow:
                0 0 7px rgba(255, 255, 255, 0.6),
                0 0 15px rgba(0, 240, 255, 0.5),
                0 0 20px rgba(0, 240, 255, 0.4),
                0 0 30px rgba(0, 240, 255, 0.3);
            }
            33% {
                text-shadow:
                0 0 7px rgba(255, 255, 255, 0.6),
                0 0 15px rgba(204, 0, 255, 0.5),
                0 0 20px rgba(204, 0, 255, 0.4),
                0 0 30px rgba(204, 0, 255, 0.3);
            }
            66% {
                text-shadow:
                0 0 7px rgba(255, 255, 255, 0.6),
                0 0 15px rgba(255, 0, 128, 0.5),
                0 0 20px rgba(255, 0, 128, 0.4),
                0 0 30px rgba(255, 0, 128, 0.3);
            }
            100% {
                text-shadow:
                0 0 7px rgba(255, 255, 255, 0.6),
                0 0 15px rgba(0, 240, 255, 0.5),
                0 0 20px rgba(0, 240, 255, 0.4),
                0 0 30px rgba(0, 240, 255, 0.3);
            }
        }

        .glow-pulse {
            animation: glowPulse 5s ease-in-out infinite;
            color: #ffffff;
        }

    </style>
</head>
<body>
    <!-- Background video -->
    <iframe id="bg-anim" src="{% static 'videos/Jowstick animation.svg' %}" style="opacity: 0.5;position: fixed; top: -7%; left: -10%; width: 120%; height: 120%; z-index: -10;"></iframe>
    <!-- Overlay to darken the video -->
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: -1;"></div>


    <!-- Nav bar -->
    <nav>
        <div style="display: flex; align-items: center; gap: 0.8vw;">
            <a href="/">
                <img src="{% static 'images/pages/logo-colour.svg' %}" alt="Vision Play Hub Logo" style="height: 6vh; width: auto;" />
            </a>
            <a href="{% url 'aboutus' %}">
                <button class="button-design">About Us</button>
            </a>
            <a href="{% url 'faqs' %}">
                <button class="button-design">FAQs</button>
            </a>
        </div>
        <div style="display: flex; gap: 0.8vw;">
            <a href="{% url 'login' %}">
                <button class="button-design">Log In</button>
            </a>
            <a href="{% url 'signup' %}">
                <button class="button-design">Sign Up</button>
            </a>
        </div>
    </nav>

    <!-- Content -->
    <div class="page-aligner">
        <div class="VPH-header glow-pulse">Vision Play Hub</div>

        <div class="form-container">
            {% if messages %}
                {% for message in messages %}
                    <p class="{% if message.tags == 'success' %}message-success{% else %}message-error{% endif %}">{{ message }}</p>
                {% endfor %}
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Username" required><br>
                <input type="email" name="email" placeholder="Email" required><br>
                <input type="password" name="password" placeholder="Password" required><br>
                <button class="button-design" type="submit">Sign Up</button>
            </form>
            <div class="or-text">OR</div>
            <a href="{% provider_login_url 'google' %}" class="google-button">
                <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google Logo">
                Sign up with Google
            </a>
            <p style="color: white; margin-top: 20px;">Already have an account?</p>
            <a href="{% url 'login' %}">
                <button class="button-design" style="font-size: 0.9rem;">Log In</button>
            </a>
        </div>
    </div>
</body>
</html>
